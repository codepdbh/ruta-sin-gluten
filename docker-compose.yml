services:
  db:
    image: postgis/postgis:16-3.5
    container_name: rutasingluten-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rutasingluten
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
